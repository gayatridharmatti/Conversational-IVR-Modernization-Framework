<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRCTC Smart IVR — Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">🚆</div>
    <div class="login-title">IRCTC Smart IVR</div>
    <div class="login-sub">CONVERSATIONAL AI · MILESTONE 3</div>
    <div class="login-divider"></div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username"
             placeholder="Enter username" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password"
             placeholder="Enter password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="btn-login" onclick="doLogin()">LOGIN →</button>

    <div class="login-error" id="login-error"></div>

    <div class="login-hint">
      Demo credentials &nbsp;|&nbsp;
      User: <b>admin</b> &nbsp; Pass: <b>irctc123</b>
    </div>
  </div>

  <script>
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errEl    = document.getElementById('login-error');

      if (!username || !password) {
        errEl.textContent = 'Please enter both username and password.';
        errEl.classList.add('show');
        return;
      }

      try {
        const res  = await fetch('/auth/login', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (res.ok) {
          sessionStorage.setItem('ivr_user', username);
          window.location.href = data.redirect;
        } else {
          errEl.textContent = data.detail || 'Invalid credentials.';
          errEl.classList.add('show');
        }
      } catch (e) {
        errEl.textContent = 'Cannot connect to server. Is python main.py running?';
        errEl.classList.add('show');
      }
    }
  </script>

</body>
</html>
